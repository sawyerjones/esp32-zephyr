# controls build options

# enable sensor framework
CONFIG_SENSOR=y
# using Bosch BMP280 (boards/[].overlay specifies BMP over BME)
CONFIG_BME280=y

CONFIG_I2C=y

# logging
CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# networking
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_SOCKETS=y

# wifi
CONFIG_WIFI=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_DHCPV4=y

# dns
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_SERVER_IP_ADDRESSES=y
CONFIG_DNS_SERVER1="8.8.8.8"

# buffers
CONFIG_NET_BUF_DATA_SIZE=128
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8

# MQTT
CONFIG_MQTT_LIB=y

# dbg
# CONFIG_SHELL=y
# CONFIG_I2C_SHELL=y