<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Env Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: monospace; max-width: 900px; margin: 40px auto; padding: 0 16px; }
        canvas { max-height: 300px; margin-bottom: 24px; }
        .controls { margin-top: 12px; }
        button { margin: 4px; padding: 8px 16px; cursor: pointer; }
        #cmdStatus { margin-left: 8px; color: #555; }
        #sseStatus { font-size: 0.85em; color: #888; margin-bottom: 12px; }
    </style>
</head>
<body>
    <h2>Environment Monitor</h2>
    <div id="sseStatus">Connecting…</div>

    <canvas id="tempChart"></canvas>
    <canvas id="pressChart"></canvas>

<script>
/* ── Config ──────────────────────────────────────────────────────────── */
const API = window.location.origin + "/api";
const MAX_POINTS = 50;

/* ── Timestamp helper ────────────────────────────────────────────────── */
const pstFmt = new Intl.DateTimeFormat("en-US", {
    timeZone: "America/Los_Angeles",
    hour:   "numeric",
    minute: "2-digit",
    hour12: true,
});

function toPST(isoStr) {
    /* Stored timestamps are UTC but lack the Z suffix — append it so
       the Date constructor doesn't treat them as local time. */
    if (!isoStr.endsWith("Z") && !isoStr.includes("+")) {
        isoStr += "Z";
    }
    return pstFmt.format(new Date(isoStr));
}

/* ── Chart setup ─────────────────────────────────────────────────────── */
const sharedOpts = {
    animation: false,
    responsive: true,
    scales: { x: { ticks: { maxTicksLimit: 10 } } },
};

const tempChart = new Chart(document.getElementById("tempChart"), {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Temperature °C",
            data: [],
            borderColor: "tomato",
            tension: 0.3,
        }],
    },
    options: sharedOpts,
});

const pressChart = new Chart(document.getElementById("pressChart"), {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Pressure hPa",
            data: [],
            borderColor: "steelblue",
            tension: 0.3,
        }],
    },
    options: sharedOpts,
});

function appendPoint(reading) {
    const label = toPST(reading.timestamp);

    tempChart.data.labels.push(label);
    tempChart.data.datasets[0].data.push(reading.temp);
    if (tempChart.data.labels.length > MAX_POINTS) {
        tempChart.data.labels.shift();
        tempChart.data.datasets[0].data.shift();
    }
    tempChart.update();

    pressChart.data.labels.push(label);
    pressChart.data.datasets[0].data.push(reading.pressure);
    if (pressChart.data.labels.length > MAX_POINTS) {
        pressChart.data.labels.shift();
        pressChart.data.datasets[0].data.shift();
    }
    pressChart.update();
}

/* ── Initial load via REST, then hand off to SSE ─────────────────────── */
let lastId = 0;

async function init() {
    try {
        const res  = await fetch(`${API}/readings?limit=${MAX_POINTS}`);
        const rows = (await res.json()).reverse();   /* oldest-first */

        for (const r of rows) {
            const label = toPST(r.timestamp);
            tempChart.data.labels.push(label);
            tempChart.data.datasets[0].data.push(r.temp);
            pressChart.data.labels.push(label);
            pressChart.data.datasets[0].data.push(r.pressure);
            if (r.id > lastId) lastId = r.id;
        }
        tempChart.update();
        pressChart.update();
    } catch (e) {
        console.error("initial load failed:", e);
    }

    startSSE();
}

/* ── SSE ─────────────────────────────────────────────────────────────── */
function startSSE() {
    const sse = new EventSource(`${API}/stream?last_id=${lastId}`);
    const status = document.getElementById("sseStatus");

    sse.onopen = () => { status.textContent = "Live"; };

    sse.onmessage = (evt) => {
        try {
            const r = JSON.parse(evt.data);
            if (r.id > lastId) lastId = r.id;
            appendPoint(r);
        } catch (e) {
            console.error("SSE parse error:", e);
        }
    };

    sse.onerror = () => {
        status.textContent = "Reconnecting…";
        /* EventSource auto-reconnects; status resets on next onopen */
    };
}

/* ── Go ──────────────────────────────────────────────────────────────── */
init();
</script>
</body>
</html>
